<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient from Teal to Blue -->
    <linearGradient id="propDaoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background circle with a very dark slate color and a subtle teal/blue border -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="url(#propDaoGrad)" stroke-width="16" />

  <!-- The main logo shape: Stylized Isometric Building & Blockchain Blocks -->
  <!-- Top Roof / Triangle -->
  <path d="M256 120 L370 210 L330 210 L330 360 L182 360 L182 210 L142 210 Z" fill="url(#propDaoGrad)" />
  
  <!-- Interior details / building layers / DAO grid lines -->
  <!-- Center Pillar / Gateway -->
  <rect x="236" y="240" width="40" height="120" rx="8" fill="#0f172a" />
  
  <!-- Window / DAO Token Node -->
  <circle cx="256" cy="185" r="20" fill="#0f172a" />
  <circle cx="256" cy="185" r="10" fill="#3b82f6" />

  <!-- Surrounding Decentralized Nodes / DAO Network dots -->
  <circle cx="120" cy="256" r="16" fill="#14b8a6" filter="url(#glow)" />
  <circle cx="392" cy="256" r="16" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="256" cy="70" r="18" fill="#22c55e" filter="url(#glow)" /> <!-- Emerald peak -->
  
  <!-- Connection lines (dashed) -->
  <path d="M136 256 L182 256" stroke="#14b8a6" stroke-width="4" stroke-dasharray="8 4" opacity="0.6" />
  <path d="M376 256 L330 256" stroke="#3b82f6" stroke-width="4" stroke-dasharray="8 4" opacity="0.6" />
  <path d="M256 88 L256 120" stroke="#22c55e" stroke-width="4" stroke-dasharray="6 3" opacity="0.6" />
</svg>